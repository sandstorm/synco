name: release-test

on: [ push, pull_request ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      # Runs the full suite, including the end-to-end tests. These spin up a
      # MariaDB container via gnomock, which uses the Docker daemon that is
      # preinstalled on the ubuntu-latest runner.
      - name: Run tests
        run: make test
      - name: Run GoReleaser Tests
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: --snapshot --skip=publish --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
